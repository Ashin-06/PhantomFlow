# monitoring/prometheus.yml
# Prometheus configuration for PhantomFlow

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: 'phantomflow'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # Add alertmanager host when configured

scrape_configs:
  - job_name: 'phantomflow-pipeline'
    static_configs:
      - targets: ['pipeline-worker:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'phantomflow-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka-1:7071', 'kafka-2:7071', 'kafka-3:7071']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
